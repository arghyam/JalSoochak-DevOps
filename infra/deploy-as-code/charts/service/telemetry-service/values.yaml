# Common Labels
labels:
  app: "telemetry-service"
  group: "core"


ingress:
  enabled: true
  contexts:
    - "api/v1/telemetry"
    - "api/v1/publish"
# Init Containers Configs

# Container Configs
image:
  repository: "252649026375.dkr.ecr.ap-south-1.amazonaws.com/telemetry-service"
  tag: "6bca4f49994026eb4b569933744273101722eddd"
replicas: "1"
# tracing-enabled: true
# healthChecks:
#   enabled: true
#   livenessProbePath: "/management-service/health"
#   readinessProbePath: "/management-service/health"

# Additional Container Envs
env: |
  - name: JAVA_OPTS
    value: -Xmx192m -Xms192m
  - name: SERVER_PORT
    value: "8080"
  - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
    value: "kafka-kraft-controller-headless:9092"
  - name: SPRING_DATASOURCE_URL
    valueFrom:
      secretKeyRef:
        key: db-url
        name: jalsoochak
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        key: username
        name: jalsoochak
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        key: password
        name: jalsoochak
  - name: KEYCLOAK_AUTH_SERVER_URL
    value: "http://keycloak:80/keycloak"
  - name: SPRING_MAIL_USERNAME
    valueFrom:
      secretKeyRef:
        key: mail-username
        name: jalsoochak
  - name: SPRING_MAIL_PASSWORD
    valueFrom:
      secretKeyRef:
        key: mail-password
        name: jalsoochak
  - name: MAIL_FROM_EMAIL
    valueFrom:
      secretKeyRef:
        key: mail-id
        name: jalsoochak
  - name: SPRING_MAIL_PROPERTIES_MAIL_SMTP_DEBUG
    value: "true"
  - name: KEYCLOAK_REALM
    valueFrom:
      secretKeyRef:
        key: keycloak-realm
        name: jalsoochak
  - name: KEYCLOAK_PUBLIC_KEY
    valueFrom:
      secretKeyRef:
        key: keycloak-public-key
        name: jalsoochak
  - name: KEYCLOAK_CLIENT_ID
    value: "jalsoochak-app"
  - name: KEYCLOAK_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        key: keycloak-credential-secret
        name: jalsoochak
  - name: KEYCLOAK_ISSUER_URI
    valueFrom:
      secretKeyRef:
        key: keycloak-issuer-uri
        name: jalsoochak
  - name: MINIO_ENDPOINT
    valueFrom:
      secretKeyRef:
        key: endpoint
        name: minio
  - name: MINIO_BUCKET
    valueFrom:
      secretKeyRef:
        key: bucket
        name: minio
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        key: accessKey
        name: minio
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        key: secretKey
        name: minio
  - name: MINIO_REGION
    valueFrom:
      secretKeyRef:
        key: region
        name: minio
  - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
    value: "http://servicediscovery:8761/eureka"
  - name: PII_ENCRYPTION_KEY
    valueFrom:
      secretKeyRef:
        key: pii-encryption-key
        name: jalsoochak
  - name: PII_HMAC_KEY
    valueFrom:
      secretKeyRef:
        key: pii-hmac-key
        name: jalsoochak
  - name: FLOWVISION_URL
    value: https://staging.jalsoochak.in/flowvision/v1/extract-reading
  # --- Hikari Connection Pool (tuned for 50+ VU load) ---
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
    value: "25"
  - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
    value: "5"
  - name: SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT
    value: "5000"
  - name: SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD
    value: "30000"
  # --- Tomcat Thread Pool ---
  - name: SERVER_TOMCAT_THREADS_MAX
    value: "200"
  - name: SERVER_TOMCAT_THREADS_MIN_SPARE
    value: "20"
  - name: SERVER_TOMCAT_ACCEPT_COUNT
    value: "100"
  # --- Kafka Producer (tuned for reliability under load) ---
  - name: SPRING_KAFKA_PRODUCER_PROPERTIES_MAX_BLOCK_MS
    value: "10000"
  - name: SPRING_KAFKA_PRODUCER_PROPERTIES_REQUEST_TIMEOUT_MS
    value: "30000"
  - name: SPRING_KAFKA_PRODUCER_PROPERTIES_RETRIES
    value: "3"
  - name: SPRING_KAFKA_PRODUCER_PROPERTIES_ACKS
    value: "1"
  - name: GLIFIC_SYNC_USER_PHONE
    valueFrom:
      secretKeyRef:
        key: glific-username
        name: glific
  - name: GLIFIC_SYNC_USER_PASSWORD
    valueFrom:
      secretKeyRef:
        key: glific-password
        name: glific
  - name: GLIFIC_READINGS_RESUME_FLOW_ID
    value: "37172"
