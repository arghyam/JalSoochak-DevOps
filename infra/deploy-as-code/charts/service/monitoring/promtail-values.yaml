config:
  clients:
    - url: http://loki:3100/loki/api/v1/push

  snippets:
    pipelineStages:
      - docker: {}
      - regex:
          expression: ".*service=(?P<service>[A-Za-z0-9\\-]+).*"
      - labels:
          service:

extraVolumes:
  - name: varlog
    hostPath:
      path: /var/log

extraVolumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true
